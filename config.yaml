# ─────────────────────────────────────────────
# Research Digest Configuration
# Edit this file to add/remove feeds or change the prompt — no
# changes to weekly_digest.py needed.
# ─────────────────────────────────────────────

# ── FEEDS ──────────────────────────────────────────────────────────────
# One RSS/Atom feed URL per line. Grouped with comments purely for
# readability — the script just reads this as a flat list.
feeds:

  # PREPRINT SERVERS
  - "https://rss.arxiv.org/rss/stat.ME"                              # arXiv: Statistics - Methodology
  - "https://rss.arxiv.org/rss/stat.AP"                              # arXiv: Statistics - Applications
  - "https://osf.io/preprints/socarxiv/feed/"                        # SocArXiv — social sciences preprints
  - "https://osf.io/preprints/psyarxiv/feed/"                        # PsyArXiv — psychology 

  # CORE JOURNALS — PUBLIC OPINION & SURVEY METHODS
  - "https://academic.oup.com/rss/site_6317/advanceAccess_6317.xml"  # Public Opinion Quarterly (POQ)
  - "https://academic.oup.com/rss/site_6316/advanceAccess_6316.xml"  # International Journal of Public Opinion Research (IJPOR)
  - "https://academic.oup.com/rss/site_6318/advanceAccess_6318.xml"  # Journal of Survey Statistics and Methodology (JSSAM)
  - "https://www.surveypractice.org/gateway/rss/"                    # Survey Practice — open access, applied

  # CORE JOURNALS — METHODS & BEHAVIOUR
  - "https://link.springer.com/search.rss?facet-journal-id=13428&channel-name=Behavior+Research+Methods"  # Behavior Research Methods (Springer)
  - "https://www.apa.org/pubs/journals/rss/met.xml"                  # Psychological Methods (APA)

  # HIGH-IMPACT GENERAL SCIENCE
  - "https://www.pnas.org/action/showFeed?type=topic&feed=rss&jc=pnas&topicCode=100"  # PNAS — Social Science
  - "https://www.pnas.org/action/showFeed?type=topic&feed=rss&jc=pnas&topicCode=82"   # PNAS — Psychological and Cognitive Sciences
  - "https://www.nature.com/nathumbehav.rss"                         # Nature Human Behaviour

  # DIGITAL & COMPUTATIONAL METHODS
  - "https://journals.sagepub.com/action/showFeed?ui=0&mi=ehikzz&ai=2b4&jc=sscb&type=etoc&feed=rss"  # Social Science Computer Review (Sage)
  - "https://www.tandfonline.com/action/showFeed?type=etoc&feed=rss&jc=tsrm20"        # International Journal of Social Research Methodology (T&F)
  - "https://journals.sagepub.com/action/showFeed?ui=0&mi=ehikzz&ai=2b4&jc=fmxa&type=etoc&feed=rss"  # Field Methods (Sage)
  - "https://www.tandfonline.com/action/showFeed?type=etoc&feed=rss&jc=upcp20"        # Political Communication (T&F)
  - "https://www.tandfonline.com/action/showFeed?type=etoc&feed=rss&jc=witp20"        # Journal of Information Technology & Politics (T&F)

  # RESEARCH ORGANISATIONS
  - "https://www.pewresearch.org/feed/"                              # Pew Research Center
  - "https://www.aapor.org/feed/"                                    # AAPOR

# ── PROMPT: RESEARCHER PROFILE ────────────────────────────────────────
# Rendered under "...working across the following areas:" in the prompt.
researcher_profile: |
  - Online research methodologies and the use of crowdsourced or online samples for research
  - Data quality in online and crowdsourced samples (e.g. attention, satisficing, bots, fraud)
  - Public opinion, polling, and political attitudes
  - Survey methodology (design, mode effects, non-response, weighting, questionnaire design)
  - Synthetic data generation, validation, and applications (including use cases in market research, social science, and survey research)
  - Computational and digital social science methods
  - Validity and utility of online samples compared to probability samples

# ── PROMPT: SELECTION INSTRUCTIONS ────────────────────────────────────
# Rendered under "From the N papers below, please:" in the prompt.
instructions: |
  1. Select the 8-12 most relevant and interesting ones. Cast a wide net — include papers that
     partially touch on these areas or offer methodological insights applicable to them, not just
     papers squarely in the field.
  2. Group them into 2-3 thematic sections with clear headings (e.g. "Online Samples & Data Quality",
     "Survey Methods & Design", "Synthetic Data", "Public Opinion & Polling").
  3. For each paper write 2-3 sentences: what it does, and why it matters for this researcher's work.
  4. Format your response as clean HTML using <h2>, <h3>, <p>, <a> tags. Make titles clickable links.
  5. End with a one-paragraph "Editor's Pick" highlighting the single most interesting or useful paper.
